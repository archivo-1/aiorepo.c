<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aio - Visor CAD DXF</title>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050608; color: #f5f5f5; font-family: system-ui, -apple-system, sans-serif; }
        canvas { display: block; }

        #loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050608; z-index: 100; gap: 1rem; pointer-events: none; }
        #loading.hidden { display: none; }
        .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { margin: 0; font-size: 0.9rem; color: #9ca3af; letter-spacing: 0.02em; }

        #overlay { position: fixed; top: 10px; left: 10px; padding: 0.55rem 0.85rem; background: rgba(5,6,8,0.82); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; font-size: 0.75rem; max-width: 200px; pointer-events: none; line-height: 1.7; backdrop-filter: blur(4px); z-index: 10; }
        #overlay h1 { margin: 0 0 0.3rem 0; font-size: 0.82rem; font-weight: 600; color: #f5f5f5; }
        .ctrl-row { display: flex; gap: 0.5rem; margin: 0; color: #9ca3af; }
        .ctrl-key { color: #e5e7eb; font-weight: 500; min-width: 76px; flex-shrink: 0; }
        .mode-indicator { margin-top: 0.4rem; padding-top: 0.4rem; border-top: 1px solid rgba(255,255,255,0.07); color: #6b7280; font-size: 0.7rem; }
        .mode-indicator span { color: #3b82f6; font-weight: 600; }

        #layers-panel { position: fixed; top: 10px; right: 130px; width: 190px; background: rgba(10,12,20,0.88); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; z-index: 10; backdrop-filter: blur(4px); overflow: hidden; }
        #layers-header { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0.75rem; cursor: pointer; user-select: none; }
        #layers-header h2 { margin: 0; font-size: 0.72rem; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; }
        #layers-chevron { font-size: 0.65rem; color: #6b7280; transition: transform 0.2s; }
        #layers-panel.collapsed #layers-chevron { transform: rotate(-90deg); }
        #layers-body { max-height: 40vh; overflow-y: auto; padding: 0 0.75rem 0.6rem; display: flex; flex-direction: column; gap: 0.35rem; }
        #layers-panel.collapsed #layers-body { display: none; }
        .layer-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.7rem; color: #d1d5db; min-height: 26px; }

        .toggle-switch { position: relative; display: inline-block; width: 32px; height: 18px; flex-shrink: 0; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
        .toggle-track { position: absolute; inset: 0; background: rgba(255,255,255,0.12); border-radius: 18px; transition: background 0.2s; cursor: pointer; }
        .toggle-track::after { content: ''; position: absolute; width: 12px; height: 12px; left: 3px; top: 3px; background: #6b7280; border-radius: 50%; transition: transform 0.2s, background 0.2s; }
        .toggle-switch input:checked + .toggle-track { background: rgba(59,130,246,0.5); }
        .toggle-switch input:checked + .toggle-track::after { transform: translateX(14px); background: #3b82f6; }

        #style-modes { position: fixed; bottom: 56px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; z-index: 10; }
        #cam-modes { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 10; flex-wrap: wrap; justify-content: center; }
        .style-btn, .cam-btn { padding: 0.28rem 0.65rem; font-size: 0.7rem; font-weight: 500; background: rgba(10,12,20,0.85); color: #9ca3af; border: 1px solid rgba(255,255,255,0.08); border-radius: 5px; cursor: pointer; backdrop-filter: blur(4px); transition: 0.12s; white-space: nowrap; }
        .style-btn.active { background: rgba(124,58,237,0.25); color: #a78bfa; border-color: rgba(124,58,237,0.5); }
        .cam-btn.active { background: rgba(59,130,246,0.2); color: #60a5fa; border-color: rgba(59,130,246,0.5); }

        #back-btn, #reset-btn { position: fixed; right: 10px; padding: 0.4rem 0.8rem; background: rgba(10,12,20,0.85); color: #f5f5f5; border: 1px solid rgba(255,255,255,0.1); border-radius: 7px; cursor: pointer; z-index: 10; font-size: 0.75rem; }
        #back-btn { top: 10px; }
        #reset-btn { top: 46px; color: #9ca3af; }

        #model-title { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); font-size: 0.78rem; font-weight: 500; color: #6b7280; pointer-events: none; z-index: 10; letter-spacing: 0.03em; }

        .collection-nav-container { position: fixed; top: 50%; right: 14px; transform: translateY(-50%); z-index: 900; display: flex; align-items: center; transition: all 0.4s; }
        .coll-side-tab { background: rgba(0, 0, 0, 0.9); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.4); padding: 18px 7px; border-radius: 10px 0 0 10px; cursor: pointer; writing-mode: vertical-rl; text-transform: uppercase; font-size: 0.58rem; font-weight: 800; letter-spacing: 0.15em; }
        .coll-panel { background: #0d1117; width: 0; height: 0; overflow: hidden; transition: all 0.3s; display: flex; flex-direction: column; }
        .collection-nav-container.open .coll-panel { width: 280px; height: 65vh; border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 10px 0 0 10px; }
        .coll-item { display: block; padding: 0.9rem 1.2rem; color: #9ca3af; text-decoration: none; font-size: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .coll-item.active { color: #3b82f6; background: rgba(59, 130, 246, 0.05); font-weight: 600; border-right: 3px solid #3b82f6; }

        @media (max-width: 600px) {
            #overlay, #model-title { display: none; }
            #layers-panel { top: 8px; left: 8px; width: 150px; }
        }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <p>Interpretando archivo CAD...</p>
    </div>

    <div id="overlay">
        <h1>Controles CAD</h1>
        <div id="dxf-controls">
            <p class="ctrl-row"><span class="ctrl-key">Click Izq.</span> Panear / Rotar</p>
            <p class="ctrl-row"><span class="ctrl-key">Scroll</span> Zoom</p>
            <p class="ctrl-row"><span class="ctrl-key">R</span> Resetear Vista</p>
        </div>
        <div class="mode-indicator">Visualización: <span id="mode-label">Planimetría</span></div>
    </div>

    <div id="model-title">Cargando archivo...</div>

    <div class="collection-nav-container" id="collection-nav" style="display: none;">
        <div class="coll-side-tab" id="collTab">Colección</div>
        <div class="coll-panel" id="collPanel">
            <div class="coll-panel-header" style="padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05);">
                <h2 id="collNameLabel" style="font-size: 0.65rem; text-transform: uppercase; color: #3b82f6; margin: 0;">Navegar</h2>
            </div>
            <div id="collItemList"></div>
        </div>
    </div>

    <div id="layers-panel" class="collapsed">
        <div id="layers-header" onclick="document.getElementById('layers-panel').classList.toggle('collapsed')">
            <h2>Capas AutoCAD</h2>
            <span id="layers-chevron">&#9660;</span>
        </div>
        <div id="layers-body">
            <div id="layers-list"></div>
        </div>
    </div>

    <div id="style-modes">
        <button class="style-btn active" data-style="original">Color Original</button>
        <button class="style-btn" data-style="monochrome">Monocromo</button>
        <button class="style-btn" data-style="invert">Invertir</button>
    </div>

    <div id="cam-modes">
        <button class="cam-btn active" data-mode="top">1 · Vista Superior (2D)</button>
        <button class="cam-btn" data-mode="orbit">2 · Órbita 3D</button>
    </div>

    <button id="back-btn">← Volver</button>
    <button id="reset-btn" onclick="window.resetCamera()">↺ Resetear</button>

   <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/dxf-parser@1.1.2/dist/dxf-parser.min.js"></script>
   <script src="viewer-dxf.js"></script>

    <script>
  function getQueryParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  function getLocalItems() {
    try {
      const raw = sessionStorage.getItem('archvista-local-items');
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) {
      console.warn('No se pudieron leer items locales:', e);
      return [];
    }
  }

  function isLocalSource() {
    return getQueryParam('source') === 'local';
  }

  async function loadContent() {
    if (isLocalSource()) {
      return getLocalItems();
    }

    const slugDirArc = getQueryParam('slugDirArc');
    let url;

    if (slugDirArc) {
      url = `https://zihojlqhxfxdjahgrbwy.functions.supabase.co/dirarc-json?slug=${encodeURIComponent(slugDirArc)}`;
    } else {
      url = 'content.json';
    }

    const res = await fetch(url);
    const data = await res.json();
    const items = Array.isArray(data) ? data : (data.items || []);
    return items;
  }

  function setupCollectionSideNav(allData, currentItem) {
    const collName = currentItem.coleccion;
    if (!collName) return;

    const siblings = allData.filter(i => i.coleccion === collName);
    if (siblings.length <= 1) return;

    const container = document.getElementById('collection-nav');
    if (!container) return;

    container.style.display = 'flex';

    const label = document.getElementById('collNameLabel');
    if (label) label.textContent = collName;

    const itemList = document.getElementById('collItemList');
    if (!itemList) return;

    const slugDirArc = getQueryParam('slugDirArc');
    const source = getQueryParam('source');
    const extraSlug = slugDirArc ? `&slugDirArc=${encodeURIComponent(slugDirArc)}` : '';
    const extraSource = source ? `&source=${encodeURIComponent(source)}` : '';
    const extra = `${extraSlug}${extraSource}`;

    itemList.innerHTML = siblings.map(i => {
      const visorType = i.visor || 'media';
      const url = `viewer-${visorType}.html?id=${encodeURIComponent(i.id)}${extra}`;
      return `
        <a href="${url}" class="coll-item ${i.id === currentItem.id ? 'active' : ''}">
          ${i.nombre}
        </a>
      `;
    }).join('');

    const tab = document.getElementById('collTab');
    if (tab) {
      tab.onclick = (e) => {
        e.stopPropagation();
        container.classList.toggle('open');
      };
    }

    document.addEventListener('pointerdown', (e) => {
      if (!container.contains(e.target) && container.classList.contains('open')) {
        container.classList.remove('open');
      }
    });
  }

function setupBackButton() {
  const backBtn = document.getElementById('back-btn');
  if (!backBtn) return;

  if (isLocalSource()) {
    backBtn.textContent = '✕ Cerrar';
    backBtn.title = 'Cerrar vista previa';
    backBtn.onclick = () => {
      window.close();
    };
    return;
  }

  backBtn.textContent = '← Volver';
  backBtn.title = 'Volver';
  backBtn.onclick = () => {
    const slugDirArc = getQueryParam('slugDirArc');

    if (slugDirArc) {
      window.location.href = `index.html?slugDirArc=${encodeURIComponent(slugDirArc)}`;
    } else if (window.history.length > 1) {
      window.history.back();
    } else {
      window.location.href = 'index.html';
    }
  };
}

  (async function () {
    setupBackButton();

    const id = getQueryParam('id') || getQueryParam('file');
    const titleEl = document.getElementById('model-title');

    try {
      const data = await loadContent();
      const currentItem = data.find(item => item.id === id || item.archivo === id || item.archivo === (id || '').replace('models/', ''));

      if (!currentItem) return;

      if (titleEl) {
        titleEl.textContent = currentItem.nombre || currentItem.id || 'Archivo DXF';
      }

      setupCollectionSideNav(data, currentItem);
    } catch (err) {
      console.warn('Error cargando colección DXF:', err);
    }
  })();
</script>
</body>
</html>
