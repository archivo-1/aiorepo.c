<!DOCTYPE html>

</head>
<body>
<header>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
    const DASH_RESET = [1, 0];

    function getQueryParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
    }

    function getLocalItems() {
        try {
            const raw = sessionStorage.getItem('archvista-local-items');
            if (!raw) return [];
            const parsed = JSON.parse(raw);
            return Array.isArray(parsed) ? parsed : [];
        } catch (e) {
            console.warn('No se pudieron leer items locales:', e);
            return [];
        }
    }

    function isLocalSource() {
        return getQueryParam('source') === 'local';
    }

    async function loadContent() {
        if (isLocalSource()) return getLocalItems();
        const slugDirArc = getQueryParam('slugDirArc');
        let url;
        if (slugDirArc) {
            url = `https://zihojlqhxfxdjahgrbwy.functions.supabase.co/dirarc-json?slug=${encodeURIComponent(slugDirArc)}`;
        } else {
            url = 'content.json';
        }
        const res = await fetch(url);
        const data = await res.json();
        return Array.isArray(data) ? data : (data.items || []);
    }

    const itemId = getQueryParam('id');

    document.getElementById('btn-raw').addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('raw-panel').classList.toggle('open');
    });

    document.getElementById('close-raw').addEventListener('click', () => {
        document.getElementById('raw-panel').classList.remove('open');
    });

    function normalizeLng180(lng) {
        let x = lng;
        while (x > 180) x -= 360;
        while (x < -180) x += 360;
        return x;
    }

    function cloneFeature(feature) {
        return JSON.parse(JSON.stringify(feature));
    }

    function getFeatureKey(feature) {
        return (
            (feature.properties && (feature.properties.featureid || feature.properties.id || feature.properties.name || feature.properties.nombre || feature.properties.title)) ||
            JSON.stringify(feature.geometry || {})
        );
    }

    function parseHexColor(value) {
        if (typeof value !== 'string') return null;
        const v = value.trim();
        return /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(v) ? v : null;
    }

    function getFeatureDisplayName(feature, item) {
        const props = feature.properties || {};
        return props.name || props.nombre || props.title || item?.nombre || 'Infraestructura';
    }

    function getFeatureDisplayType(feature) {
        return (feature && feature.geometry && feature.geometry.type) || 'Vector';
    }

    function getFeatureTimelineBadge(feature) {
        const state = getTimelineState((feature && feature.properties) || {}, appState.timelineValue, getFeatureDisplayType(feature));
        if (state === 'planned') return 'Commissioned';
        if (state === 'active') return 'Active';
        if (state === 'decom') return 'Decommissioned';
        if (state === 'hidden') return 'Hidden';
        return 'Visible';
    }

    function featureMatchesSearch(feature, query, item) {
        if (!query) return true;
        const props = feature.properties || {};
        const blob = [
            getFeatureDisplayName(feature, item),
            getFeatureDisplayType(feature),
            props.type || '',
            props.description || props.descripcion || props.desc || '',
            props.id || '',
            props.featureid || ''
        ].join(' ').toLowerCase();
        return blob.includes(query.toLowerCase());
    }

    function getFeatureById(featureId) {
        return appState.rawFeaturesById.get(String(featureId));
    }

    function selectFeatureById(featureId, options = {}) {
        const feature = getFeatureById(featureId);
        if (!feature) return;
        appState.selectedFeatureId = String(featureId);
        if (appState.map) refreshLayerStyles(appState.map);
        renderFeatureTable();
        showFeatureInfo(feature, appState.item);
        if (options.center !== false) fitToOriginalFeature(feature);
    }

    function setRawPanelTab(mode) {
        const isText = mode === 'text';
        document.getElementById('raw-tab-text').classList.toggle('active', isText);
        document.getElementById('raw-tab-list').classList.toggle('active', !isText);
        document.getElementById('raw-view-text').classList.toggle('active', isText);
        document.getElementById('raw-view-list').classList.toggle('active', !isText);
    }

    function buildFeatureIndex(features, item) {
        appState.featureIndex = (features || []).map((feature, idx) => {
            const props = feature.properties || {};
            return {
                id: String(props.__featureId || idx),
                name: getFeatureDisplayName(feature, item),
                type: getFeatureDisplayType(feature),
                color: getFeatureBaseColor(feature),
                feature
            };
        });
    }

    function renderFeatureTable() {
        const body = document.getElementById('feature-table-body');
        const empty = document.getElementById('feature-empty');
        const meta = document.getElementById('feature-list-meta');
        const q = (document.getElementById('feature-search').value || '').trim();
        const filtered = appState.featureIndex.filter(entry => featureMatchesSearch(entry.feature, q, appState.item));
        meta.textContent = `${filtered.length} / ${appState.featureIndex.length} features`;
        if (!filtered.length) {
            body.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';
        body.innerHTML = filtered.map(entry => {
            const badge = getFeatureTimelineBadge(entry.feature);
            const active = String(entry.id) === String(appState.selectedFeatureId);
            const props = entry.feature.properties || {};
            const sub = props.type || props.featureid || props.id || '';
            return `
                <tr class="feature-row ${active ? 'active' : ''}" data-feature-id="${entry.id}">
                    <td><span class="feature-name">${entry.name}</span>${sub ? `<span class="feature-sub">${sub}</span>` : ''}</td>
                    <td><span class="feature-badge"><span class="feature-color-dot" style="background:${entry.color}"></span>${entry.type}</span></td>
                    <td><span class="feature-badge">${badge}</span></td>
                </tr>`;
        }).join('');
        body.querySelectorAll('.feature-row').forEach(row => {
            row.addEventListener('click', () => {
                selectFeatureById(row.dataset.featureId);
            });

    function updateHoverTooltip(feature, point) {
        const tooltip = document.getElementById('hover-tooltip');
        if (!feature || !appState.hoverPopupEnabled) {
            tooltip.classList.remove('visible');
            return;
        }
        const original = getFeatureById(feature.properties && feature.properties.__featureId);
        if (!original) {
            tooltip.classList.remove('visible');
            return;
        }
        document.getElementById('hover-tooltip-title').textContent = getFeatureDisplayName(original, appState.item);
        document.getElementById('hover-tooltip-meta').textContent = `${getFeatureDisplayType(original)} · ${getFeatureTimelineBadge(original)}`;
        tooltip.style.left = `${point.x}px`;
        tooltip.style.top = `${point.y}px`;
        tooltip.classList.add('visible');
    }

    function hideHoverTooltip() {
        document.getElementById('hover-tooltip').classList.remove('visible');
        appState.hoverFeatureId = null;
    }

    function buildTimelineMarks(minYear, maxYear) {
        const ticksEl = document.getElementById('time-ticks');
        const labelsEl = document.getElementById('time-labels');
        ticksEl.innerHTML = '';
        labelsEl.innerHTML = '';
        const span = Math.max(1, maxYear - minYear);
        const majorCount = Math.min(6, span + 1);
        const years = [];
        for (let i = 0; i < majorCount; i += 1) {
            years.push(Math.round(minYear + (span * i / Math.max(1, majorCount - 1))));
        }
        const uniqueYears = [...new Set(years)];
        const minorCount = Math.min(16, span + 1);
        for (let i = 0; i < minorCount; i += 1) {
            const left = (i / Math.max(1, minorCount - 1)) * 100;
            const tick = document.createElement('div');
            tick.className = 'time-tick';
            tick.style.left = `${left}%`;
            ticksEl.appendChild(tick);
        }
        uniqueYears.forEach(year => {
            const left = ((year - minYear) / span) * 100;
            const tick = document.createElement('div');
            tick.className = 'time-tick major';
            tick.style.left = `${left}%`;
            ticksEl.appendChild(tick);
            const label = document.createElement('div');
            label.className = 'time-label';
            label.style.left = `${left}%`;
            label.textContent = String(year);
            labelsEl.appendChild(label);
        });
    }

    function buildFeaturePopup(feature, item) {
        const props = feature.properties || {};
        const title = props.name || props.nombre || props.title || item.nombre || 'Infraestructura';
        let descHtml = props.description || props.descripcion || props.desc || item.descripcion || 'Geometría estructural del proyecto.';
        if (props.image || props.image_url) {
            const imgUrl = props.image || props.image_url;
            descHtml = `<img src="${imgUrl}" alt="Feature Image"><br>${descHtml}`;
        }
        return {
            title,
            descHtml,
            meta: props.type || (feature.geometry ? feature.geometry.type : 'Vector')
        };
    }

    function showFeatureInfo(feature, item) {
        const info = buildFeaturePopup(feature, item);
        document.getElementById('capsule-title').textContent = info.title;
        document.getElementById('capsule-desc').innerHTML = info.descHtml;
        document.getElementById('capsule-meta').textContent = info.meta;
        document.getElementById('info-capsule').classList.add('visible');
        highlightFeatureInTextarea(feature);
    }

    function highlightFeatureInTextarea(feature) {
        const panel = document.getElementById('raw-panel');
        if (!panel.classList.contains('open')) return;
        const textarea = document.getElementById('raw-textarea');
        const text = textarea.value;
        let searchString = '';
        if (feature.geometry && feature.geometry.coordinates) {
            const coordsStr = JSON.stringify(feature.geometry.coordinates);
            searchString = coordsStr.replace(/[\[\]]/g, '').split(',').slice(0, 3).join(',');
        }
        if (searchString && searchString.length > 5) {
            const index = text.indexOf(searchString);
            if (index !== -1) {
                textarea.focus();
                textarea.setSelectionRange(Math.max(0, index - 20), Math.min(text.length, index + 100));
                const lineHeight = parseInt(window.getComputedStyle(textarea).lineHeight) || 16;
                const linesBefore = text.substring(0, index).split('\n').length;
                textarea.scrollTop = (linesBefore - 1) * lineHeight - (textarea.clientHeight / 3);
            }
        }
    }

    function shiftCoords(coords, offset) {
        return coords.map(c => Array.isArray(c[0]) ? shiftCoords(c, offset) : [c[0] + offset, c[1]]);
    }

    function shiftGeometryByOffset(geometry, offset) {
        if (!geometry || !offset) return geometry;
        return { ...geometry, coordinates: shiftCoords(geometry.coordinates, offset) };
    }

    function computeFeatureBounds(feature) {
        let minLng = Infinity, minLat = Infinity, maxLng = -Infinity, maxLat = -Infinity;
        const visit = coords => {
            if (!Array.isArray(coords)) return;
            if (typeof coords[0] === 'number' && typeof coords[1] === 'number') {
                minLng = Math.min(minLng, coords[0]);
                maxLng = Math.max(maxLng, coords[0]);
                minLat = Math.min(minLat, coords[1]);
                maxLat = Math.max(maxLat, coords[1]);
                return;
            }
            coords.forEach(visit);
        };
        visit(feature.geometry && feature.geometry.coordinates);
        if (!Number.isFinite(minLng)) return null;
        return [[minLng, minLat], [maxLng, maxLat]];
    }

    function expandBounds(boundsA, boundsB) {
        if (!boundsA) return boundsB ? [[boundsB[0][0], boundsB[0][1]], [boundsB[1][0], boundsB[1][1]]] : null;
        if (!boundsB) return boundsA;
        return [
            [Math.min(boundsA[0][0], boundsB[0][0]), Math.min(boundsA[0][1], boundsB[0][1])],
            [Math.max(boundsA[1][0], boundsB[1][0]), Math.max(boundsA[1][1], boundsB[1][1])]
        ];
    }

    function bboxCenter(bounds) {
        if (!bounds) return null;
        return { lng: (bounds[0][0] + bounds[1][0]) / 2, lat: (bounds[0][1] + bounds[1][1]) / 2 };
    }

    function computeCollectionBounds(geoData) {
        const features = geoData.type === 'FeatureCollection' ? (geoData.features || []) : (geoData.type === 'Feature' ? [geoData] : []);
        let bounds = null;
        features.forEach(feature => {
            bounds = expandBounds(bounds, computeFeatureBounds(feature));
        });
        return bounds;
    }

    function normalizeTimelineFeatureProps(props) {
        const parseYear = val => {
            if (val == null) return null;
            if (typeof val === 'number' && Number.isFinite(val)) return val > 1800 && val < 3000 ? Math.round(val) : null;
            const str = String(val).trim();
            const match = str.match(/(18|19|20|21)\d{2}/);
            return match ? Number(match[0]) : null;
        };
        const comAt = parseYear(props.com_at);
        const setAt = parseYear(props.set_at);
        const decomAt = parseYear(props.decom_at);
        const removedAt = parseYear(props.removed_at);
        if (comAt == null && setAt == null) return null;
        const normalized = { com_at: comAt, set_at: setAt, decom_at: decomAt, removed_at: removedAt };
        if (normalized.com_at != null && normalized.set_at != null && normalized.com_at > normalized.set_at) normalized.com_at = normalized.set_at;
        if (normalized.decom_at != null && normalized.removed_at != null && normalized.removed_at < normalized.decom_at) normalized.decom_at = null;
        return normalized;
    }

    function detectTemporalConfig(features) {
        const values = [];
        let count = 0;
        features.forEach(feature => {
            feature.properties = feature.properties || {};
            const timeline = normalizeTimelineFeatureProps(feature.properties);
            if (!timeline) return;
            count += 1;
            feature.properties.__timeline = timeline;
            ['com_at', 'set_at', 'decom_at', 'removed_at'].forEach(k => {
                if (timeline[k] != null) values.push(timeline[k]);
            });
        });
        if (!count || !values.length) return null;
        values.sort((a, b) => a - b);
        return { min: values[0], max: values[values.length - 1], count };
    }

    function getTimelineState(props, year, geometryType) {
        const t = props && props.__timeline;
        if (!t || year == null) return 'default';
        const comAt = t.com_at;
        const setAt = t.set_at;
        const decomAt = t.decom_at;
        const removedAt = t.removed_at;
        if (removedAt != null && year >= removedAt) return 'hidden';
        if (geometryType === 'Point' || geometryType === 'MultiPoint') {
            if (setAt != null && year >= setAt) return 'active';
            return 'hidden';
        }
        if (decomAt != null && year >= decomAt) return 'decom';
        if (setAt != null && year >= setAt) return 'active';
        if (comAt != null && year >= comAt) return 'planned';
        return 'hidden';
    }

    function buildRepeatedFeatureCollection(geoData) {
        const features = geoData.type === 'FeatureCollection' ? (geoData.features || []) : (geoData.type === 'Feature' ? [geoData] : []);
        const offsets = [-360, 0, 360];
        const expanded = [];
        features.forEach((feature, featureIndex) => {
            const baseId = feature.properties && feature.properties.__featureId ? feature.properties.__featureId : String(getFeatureKey(feature) || `feature-${featureIndex}`);
            offsets.forEach(offset => {
                const copy = cloneFeature(feature);
                copy.properties = copy.properties || {};
                copy.properties.__featureId = String(baseId);
                copy.properties.__worldOffset = offset;
                copy.properties.__copyKey = `${baseId}__${offset}`;
                if (offset !== 0) copy.geometry = shiftGeometryByOffset(copy.geometry, offset);
                expanded.push(copy);
            });
        });
        return { type: 'FeatureCollection', features: expanded };
    }

    function buildBaseStyle(tileUrl, attribution) {
        return {
            version: 8,
            sources: { basemap: { type: 'raster', tiles: [tileUrl], tileSize: 256, attribution } },
            layers: [{ id: 'basemap', type: 'raster', source: 'basemap' }]
        };
    }

    function setNeedleFromBearing(map) {
        const needle = document.getElementById('compass-needle');
        const bearing = typeof map.getBearing === 'function' ? map.getBearing() : 0;
        needle.style.transform = `rotate(${-bearing}deg)`;
    }

    function setOsmButtonHref(bounds, map) {
        if (!bounds) return;
        const center = bboxCenter(bounds);
        if (!center) return;
        const safeLng = normalizeLng180(center.lng);
        const zoom = Math.min(17, Math.max(1, Math.round(map.getZoom())));
        const osmBtn = document.getElementById('btn-osm');
        osmBtn.href = `https://www.openstreetmap.org/?mlat=${center.lat}&mlon=${safeLng}#map=${zoom}/${center.lat}/${safeLng}`;
        osmBtn.style.display = 'flex';
    }

    const appState = {
        map: null,
        item: null,
        rawGeoData: null,
        expandedGeoData: null,
        datasetBounds: null,
        rawFeaturesById: new Map(),
        selectedFeatureId: null,
        temporalConfig: null,
        timelineValue: null,
        currentProjection: 'mercator',
        visibleCopyKeys: new Set(),
        featureIndex: [],
        hoverFeatureId: null,
        hoverPopupEnabled: window.matchMedia('(hover: hover) and (pointer: fine)').matches
    };

    function getFeatureBaseColor(feature) {
        const props = feature.properties || {};
        return parseHexColor(props.color) || '#00a8ff';
    }

    function featureStyleSnapshot(feature, year) {
        const geometryType = feature.geometry && feature.geometry.type;
        const state = getTimelineState(feature.properties || {}, year, geometryType);
        const baseColor = getFeatureBaseColor(feature);
        if (state === 'planned') return { visible: true, lineColor: baseColor, fillColor: baseColor, lineOpacity: 0.9, fillOpacity: 0.06, circleOpacity: 0, lineWidth: 3, circleRadius: 0 };
        if (state === 'active') return { visible: true, lineColor: baseColor, fillColor: baseColor, lineOpacity: 0.95, fillOpacity: 0.16, circleOpacity: 0.95, lineWidth: 3, circleRadius: 5.5 };
        if (state === 'decom') return { visible: true, lineColor: '#8a9099', fillColor: '#8a9099', lineOpacity: 0.58, fillOpacity: 0.08, circleOpacity: 0.58, lineWidth: 3, circleRadius: 5.1 };
        if (appState.temporalConfig) return { visible: false, lineColor: baseColor, fillColor: baseColor, lineOpacity: 0, fillOpacity: 0, circleOpacity: 0, lineWidth: 3, circleRadius: 0 };
        return { visible: true, lineColor: baseColor, fillColor: baseColor, lineOpacity: 0.95, fillOpacity: 0.16, circleOpacity: 0.95, lineWidth: 3, circleRadius: 5.5 };
    }

    function selectedFadeFactor(featureId) {
        if (!appState.selectedFeatureId) return 1;
        return String(featureId) === String(appState.selectedFeatureId) ? 1 : 0.22;
    }

    function recomputeVisibleCopyKeys() {
        const visible = new Set();
        const features = (appState.expandedGeoData && appState.expandedGeoData.features) || [];
        features.forEach(feature => {
            const style = featureStyleSnapshot(feature, appState.timelineValue);
            if (style.visible && feature.properties && feature.properties.__copyKey) visible.add(String(feature.properties.__copyKey));
        });
        appState.visibleCopyKeys = visible;
    }

    function expressionForGeometry(geomType, propKey, fallback) {
        const features = (appState.expandedGeoData && appState.expandedGeoData.features) || [];
        const entries = [];
        features.forEach(feature => {
            const type = feature.geometry && feature.geometry.type;
            const isLine = geomType === 'line' && ['LineString', 'MultiLineString', 'Polygon', 'MultiPolygon'].includes(type);
            const isFill = geomType === 'fill' && ['Polygon', 'MultiPolygon'].includes(type);
            const isCircle = geomType === 'circle' && ['Point', 'MultiPoint'].includes(type);
            const isOutline = geomType === 'outline' && ['LineString', 'MultiLineString', 'Polygon', 'MultiPolygon'].includes(type);
            const isPointOutline = geomType === 'point-outline' && ['Point', 'MultiPoint'].includes(type);
            if (!isLine && !isFill && !isCircle && !isOutline && !isPointOutline) return;
            const style = featureStyleSnapshot(feature, appState.timelineValue);
            const featureId = feature.properties.__featureId;
            const selected = appState.selectedFeatureId && String(featureId) === String(appState.selectedFeatureId);
            const fade = selectedFadeFactor(featureId);
            const copyKey = feature.properties.__copyKey;
            let value = fallback;
            if (propKey === 'lineColor') value = style.lineColor;
            if (propKey === 'fillColor') value = style.fillColor;
            if (propKey === 'lineOpacity') value = style.lineOpacity * fade;
            if (propKey === 'fillOpacity') value = style.fillOpacity * fade;
            if (propKey === 'circleOpacity') value = style.circleOpacity * fade;
            if (propKey === 'lineWidth') value = style.lineWidth;
            if (propKey === 'circleRadius') value = style.circleRadius;
            if (propKey === 'outlineOpacity') value = selected && style.visible ? 1 : 0;
            if (propKey === 'outlineWidth') value = selected && style.visible ? (['LineString', 'MultiLineString'].includes(type) ? style.lineWidth + 4 : style.lineWidth + 3) : 0;
            if (propKey === 'pointOutlineRadius') value = selected && style.visible ? style.circleRadius + 4 : 0;
            entries.push(copyKey, value);
        });
        return ['match', ['get', '__copyKey'], ...entries, fallback];
    }

    function buildCopyKeyFilter(types, stateNames) {
        const features = (appState.expandedGeoData && appState.expandedGeoData.features) || [];
        const copyKeys = [];
        features.forEach(feature => {
            const type = feature.geometry && feature.geometry.type;
            if (!types.includes(type)) return;
            const state = getTimelineState(feature.properties || {}, appState.timelineValue, type);
            if (stateNames.includes(state) && feature.properties && feature.properties.__copyKey) copyKeys.push(String(feature.properties.__copyKey));
        });
        if (!copyKeys.length) return ['==', ['get', '__copyKey'], '__none__'];
        return ['in', ['get', '__copyKey'], ['literal', copyKeys]];
    }

    function ensureSourceAndLayers(map) {
        if (!map.getSource('geojson-main')) {
            map.addSource('geojson-main', { type: 'geojson', data: appState.expandedGeoData || { type: 'FeatureCollection', features: [] } });
        }
        if (!map.getLayer('geojson-fill')) {
            map.addLayer({ id: 'geojson-fill', type: 'fill', source: 'geojson-main', filter: ['in', ['geometry-type'], ['literal', ['Polygon', 'MultiPolygon']]], paint: { 'fill-color': '#00a8ff', 'fill-opacity': 0.16 } });
        }
        if (!map.getLayer('geojson-line-outline')) {
            map.addLayer({ id: 'geojson-line-outline', type: 'line', source: 'geojson-main', filter: ['in', ['geometry-type'], ['literal', ['LineString', 'MultiLineString', 'Polygon', 'MultiPolygon']]], paint: { 'line-color': '#ffffff', 'line-width': 0, 'line-opacity': 0 } });
        }
        if (!map.getLayer('geojson-line-solid')) {
            map.addLayer({ id: 'geojson-line-solid', type: 'line', source: 'geojson-main', filter: ['==', ['get', '__copyKey'], '__none__'], paint: { 'line-color': '#00a8ff', 'line-width': 3, 'line-opacity': 0.95, 'line-dasharray': DASH_RESET } });
        }
        if (!map.getLayer('geojson-line-dashed')) {
            map.addLayer({ id: 'geojson-line-dashed', type: 'line', source: 'geojson-main', filter: ['==', ['get', '__copyKey'], '__none__'], paint: { 'line-color': '#00a8ff', 'line-width': 3, 'line-opacity': 0.95, 'line-dasharray': [2, 2] } });
        }
        if (!map.getLayer('geojson-point-outline')) {
            map.addLayer({ id: 'geojson-point-outline', type: 'circle', source: 'geojson-main', filter: ['in', ['geometry-type'], ['literal', ['Point', 'MultiPoint']]], paint: { 'circle-color': '#ffffff', 'circle-radius': 0, 'circle-opacity': 0 } });
        }
        if (!map.getLayer('geojson-circle')) {
            map.addLayer({ id: 'geojson-circle', type: 'circle', source: 'geojson-main', filter: ['in', ['geometry-type'], ['literal', ['Point', 'MultiPoint']]], paint: { 'circle-color': '#00a8ff', 'circle-radius': 5.5, 'circle-opacity': 0.95, 'circle-stroke-width': 1.2, 'circle-stroke-color': '#081014' } });
        }
    }

    function refreshLayerStyles(map) {
        recomputeVisibleCopyKeys();
        if (map.getLayer('geojson-fill')) {
            map.setPaintProperty('geojson-fill', 'fill-color', expressionForGeometry('fill', 'fillColor', '#00a8ff'));
            map.setPaintProperty('geojson-fill', 'fill-opacity', expressionForGeometry('fill', 'fillOpacity', 0.16));
        }
        if (map.getLayer('geojson-line-outline')) {
            map.setPaintProperty('geojson-line-outline', 'line-width', expressionForGeometry('outline', 'outlineWidth', 0));
            map.setPaintProperty('geojson-line-outline', 'line-opacity', expressionForGeometry('outline', 'outlineOpacity', 0));
        }
        if (map.getLayer('geojson-line-solid')) {
            map.setFilter('geojson-line-solid', buildCopyKeyFilter(['LineString', 'MultiLineString', 'Polygon', 'MultiPolygon'], ['active', 'decom', 'default']));
            map.setPaintProperty('geojson-line-solid', 'line-color', expressionForGeometry('line', 'lineColor', '#00a8ff'));
            map.setPaintProperty('geojson-line-solid', 'line-width', expressionForGeometry('line', 'lineWidth', 3));
            map.setPaintProperty('geojson-line-solid', 'line-opacity', expressionForGeometry('line', 'lineOpacity', 0.95));
            map.setPaintProperty('geojson-line-solid', 'line-dasharray', DASH_RESET);
        }
        if (map.getLayer('geojson-line-dashed')) {
            map.setFilter('geojson-line-dashed', buildCopyKeyFilter(['LineString', 'MultiLineString', 'Polygon', 'MultiPolygon'], ['planned']));
            map.setPaintProperty('geojson-line-dashed', 'line-color', expressionForGeometry('line', 'lineColor', '#00a8ff'));
            map.setPaintProperty('geojson-line-dashed', 'line-width', expressionForGeometry('line', 'lineWidth', 3));
            map.setPaintProperty('geojson-line-dashed', 'line-opacity', expressionForGeometry('line', 'lineOpacity', 0.95));
        }
        if (map.getLayer('geojson-point-outline')) {
            map.setPaintProperty('geojson-point-outline', 'circle-radius', expressionForGeometry('point-outline', 'pointOutlineRadius', 0));
            map.setPaintProperty('geojson-point-outline', 'circle-opacity', expressionForGeometry('point-outline', 'outlineOpacity', 0));
        }
        if (map.getLayer('geojson-circle')) {
            map.setPaintProperty('geojson-circle', 'circle-color', expressionForGeometry('circle', 'fillColor', '#00a8ff'));
            map.setPaintProperty('geojson-circle', 'circle-radius', expressionForGeometry('circle', 'circleRadius', 5.5));
            map.setPaintProperty('geojson-circle', 'circle-opacity', expressionForGeometry('circle', 'circleOpacity', 0.95));
        }
        renderFeatureTable();
    }

    function rehydrateOperationalLayers(map) {
        ensureSourceAndLayers(map);
        if (map.getSource('geojson-main') && appState.expandedGeoData) map.getSource('geojson-main').setData(appState.expandedGeoData);
        refreshLayerStyles(map);
    }

    function normalizeFeatureBoundsForView(feature, mapCenterLng) {
        const baseBounds = computeFeatureBounds(feature);
        if (!baseBounds) return null;
        const width = baseBounds[1][0] - baseBounds[0][0];
        if (width <= 180) return baseBounds;
        const shifts = [-720, -360, 0, 360, 720];
        let best = null;
        shifts.forEach(offset => {
            const shiftedFeature = cloneFeature(feature);
            shiftedFeature.geometry = shiftGeometryByOffset(shiftedFeature.geometry, offset);
            const shiftedBounds = computeFeatureBounds(shiftedFeature);
            if (!shiftedBounds) return;
            const center = bboxCenter(shiftedBounds);
            const dist = Math.abs(center.lng - mapCenterLng);
            if (!best || dist < best.dist) best = { bounds: shiftedBounds, dist };
        });
        return best ? best.bounds : baseBounds;
    }

    function fitToOriginalFeature(feature) {
        if (!appState.map || !feature) return;
        const center = appState.map.getCenter();
        const bounds = normalizeFeatureBoundsForView(feature, center.lng);
        if (bounds) appState.map.fitBounds(bounds, { padding: 40, maxZoom: 16, duration: 600 });
    }

    function bindStyleSwitcher(map) {
        const styles = {
            dark: buildBaseStyle('https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', '&copy; CARTO &copy; OpenStreetMap contributors'),
            light: buildBaseStyle('https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', '&copy; CARTO &copy; OpenStreetMap contributors'),
            osm: buildBaseStyle('https://tile.openstreetmap.org/{z}/{x}/{y}.png', '&copy; OpenStreetMap contributors')
        };
        const buttons = {
            dark: document.getElementById('btn-style-dark'),
            light: document.getElementById('btn-style-light'),
            osm: document.getElementById('btn-style-osm')
        };
        const setActive = key => Object.entries(buttons).forEach(([k, btn]) => btn.classList.toggle('active', k === key));
        Object.entries(buttons).forEach(([key, btn]) => {
            btn.addEventListener('click', () => {
                const projection = appState.currentProjection;
                map.setStyle(styles[key]);
                setActive(key);
                map.once('styledata', () => {
                    if (projection === 'globe' && map.setProjection) { try { map.setProjection({ type: 'globe' }); } catch (_) {} }
                    rehydrateOperationalLayers(map);
                });
            });
        });
        setActive('dark');
    }

    function setupTimeline(features) {
        appState.temporalConfig = detectTemporalConfig(features);
        const panel = document.getElementById('time-panel');
        const slider = document.getElementById('time-slider');
        const valueEl = document.getElementById('time-value');
        const metaEl = document.getElementById('time-meta');
        ['pointerdown', 'mousedown', 'touchstart', 'click'].forEach(evt => {
            panel.addEventListener(evt, e => e.stopPropagation());
            slider.addEventListener(evt, e => e.stopPropagation());
        });
        if (!appState.temporalConfig) {
            panel.classList.remove('visible');
            appState.timelineValue = null;
            return;
        }
        appState.timelineValue = appState.temporalConfig.min;
        slider.min = String(appState.temporalConfig.min);
        slider.max = String(appState.temporalConfig.max);
        slider.value = String(appState.temporalConfig.min);
        valueEl.textContent = String(appState.temporalConfig.min);
        metaEl.textContent = `${appState.temporalConfig.count} feature(s) · escala ${appState.temporalConfig.min}–${appState.temporalConfig.max}`;
        buildTimelineMarks(appState.temporalConfig.min, appState.temporalConfig.max);
        panel.classList.add('visible');
        slider.oninput = () => {
            appState.timelineValue = Number(slider.value);
            valueEl.textContent = String(appState.timelineValue);
            if (appState.map) refreshLayerStyles(appState.map);
            renderFeatureTable();
        };
    }

    let interactionsBound = false;
    function bindMapInteractions(map) {
        if (interactionsBound) return;
        interactionsBound = true;

        function getInteractiveFeatures(point) {
            const bbox = [[point.x - 6, point.y - 6], [point.x + 6, point.y + 6]];
            const features = map.queryRenderedFeatures(bbox, { layers: ['geojson-fill', 'geojson-line-solid', 'geojson-line-dashed', 'geojson-circle'] });
            return features.filter(f => f.properties && appState.visibleCopyKeys.has(String(f.properties.__copyKey)));
        }

        map.on('mousemove', (e) => {
            const visibleFeatures = getInteractiveFeatures(e.point);
            const canvas = map.getCanvas();
            if (!visibleFeatures.length) {
                canvas.style.cursor = '';
                hideHoverTooltip();
                return;
            }
            const picked = visibleFeatures[0];
            canvas.style.cursor = 'pointer';
            updateHoverTooltip(picked, e.point);
        });

        map.on('mouseleave', () => {
            map.getCanvas().style.cursor = '';
            hideHoverTooltip();
        });

        map.on('dragstart', hideHoverTooltip);
        map.on('zoomstart', hideHoverTooltip);
        map.on('rotatestart', hideHoverTooltip);
        map.on('pitchstart', hideHoverTooltip);

        map.on('click', (e) => {
            const visibleFeatures = getInteractiveFeatures(e.point);
            if (!visibleFeatures.length) {
                appState.selectedFeatureId = null;
                refreshLayerStyles(map);
                document.getElementById('info-capsule').classList.remove('visible');
                return;
            }
            const picked = visibleFeatures[0];
            const featureId = picked.properties && picked.properties.__featureId;
            if (!featureId) return;
            selectFeatureById(featureId);
        });
        map.on('rotate', () => setNeedleFromBearing(map));
        map.on('pitch', () => setNeedleFromBearing(map));
    }

    async function initMap() {
        const data = await loadContent();
        const item = data.find(m => m.id === itemId);
        if (!item) return;
        appState.item = item;
        document.getElementById('map-title').textContent = item.nombre || item.id;
        setupCollectionSideNav(data, item);
        const map = new maplibregl.Map({
            container: 'map',
            style: buildBaseStyle('https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', '&copy; CARTO &copy; OpenStreetMap contributors'),
            center: [item.lon || -71.61, item.lat || -33.04],
            zoom: item.zoom || 13,
            attributionControl: true,
            hash: false,
            antialias: true,
            renderWorldCopies: true,
            maxPitch: 70,
            dragRotate: true,
            touchPitch: true
        });
        appState.map = map;
        map.addControl(new maplibregl.NavigationControl({ visualizePitch: true, showCompass: false }), 'bottom-left');
        bindStyleSwitcher(map);
        document.getElementById('btn-reset-view').addEventListener('click', () => {
            if (appState.datasetBounds) map.fitBounds(appState.datasetBounds, { padding: 24, maxZoom: 16, duration: 600 });
        });
        document.getElementById('btn-projection').addEventListener('click', () => {
            if (!map.setProjection) return;
            appState.currentProjection = appState.currentProjection === 'mercator' ? 'globe' : 'mercator';
            try {
                map.setProjection({ type: appState.currentProjection });
                document.getElementById('btn-projection').classList.toggle('active', appState.currentProjection === 'globe');
            } catch (err) {
                console.warn('No se pudo cambiar la proyección:', err);
            }
        });
        map.on('load', async () => {
            if (!(item.resolved_url || item.archivo)) return;
            const path = item.resolved_url || item.archivo;
            try {
                const res = await fetch(path);
                const geoData = await res.json();
                appState.rawGeoData = geoData.type === 'FeatureCollection' ? geoData : { type: 'FeatureCollection', features: geoData.type === 'Feature' ? [geoData] : [] };
                document.getElementById('raw-textarea').value = JSON.stringify(geoData, null, 2);
                const features = appState.rawGeoData.features || [];
                appState.rawFeaturesById = new Map();
                features.forEach((feature, idx) => {
                    feature.properties = feature.properties || {};
                    const featureId = String(getFeatureKey(feature) || `feature-${idx}`);
                    feature.properties.__featureId = featureId;
                    appState.rawFeaturesById.set(featureId, feature);
                });
                buildFeatureIndex(features, item);
                renderFeatureTable();
                setupTimeline(features);
                appState.expandedGeoData = buildRepeatedFeatureCollection(appState.rawGeoData);
                appState.datasetBounds = computeCollectionBounds(appState.rawGeoData);
                ensureSourceAndLayers(map);
                map.getSource('geojson-main').setData(appState.expandedGeoData);
                refreshLayerStyles(map);
                bindMapInteractions(map);
                if (appState.datasetBounds) {
                    map.fitBounds(appState.datasetBounds, { padding: 24, maxZoom: 16, duration: 0 });
                    setOsmButtonHref(appState.datasetBounds, map);
                }
                setNeedleFromBearing(map);
            } catch (err) {
                console.error('Error leyendo GeoJSON', err);
                document.getElementById('raw-textarea').value = 'Error leyendo o parseando el archivo JSON/GeoJSON.';
            }
        });
    }

    function setupCollectionSideNav(allData, currentItem) {
        const collName = currentItem.coleccion || currentItem.collection;
        if (!collName) return;
        const siblings = allData.filter(i => i.coleccion === collName || i.collection === collName);
        if (siblings.length <= 1) return;
        const container = document.getElementById('collection-nav');
        container.style.display = 'flex';
        const itemList = document.getElementById('collItemList');
        const slugDirArc = getQueryParam('slugDirArc');
        const source = getQueryParam('source');
        const extraSlug = slugDirArc ? `&slugDirArc=${encodeURIComponent(slugDirArc)}` : '';
        const extraSource = source ? `&source=${encodeURIComponent(source)}` : '';
        const extra = `${extraSlug}${extraSource}`;
        itemList.innerHTML = siblings.map(i => {
            const visorType = i.visor || 'media';
            const url = `viewer-${visorType}.html?id=${encodeURIComponent(i.id)}${extra}`;
            return `\n                <a href="${url}" class="coll-item ${i.id === currentItem.id ? 'active' : ''}">\n                    ${i.nombre || i.id}\n                </a>`;
        }).join('');
        document.getElementById('collTab').onclick = (e) => {
            e.stopPropagation();
            container.classList.toggle('open');
        };
        document.addEventListener('pointerdown', e => {
            if (!container.contains(e.target) && !e.target.closest('.maplibregl-ctrl')) container.classList.remove('open');
        });
    }

    initMap();

    (function setupBackButton() {
        const backBtn = document.getElementById('back-btn');
        if (!backBtn) return;
        if (isLocalSource()) {
            backBtn.innerHTML = '<span>✕</span><span class="btn-back-text">&nbsp;Cerrar</span>';
            backBtn.title = 'Cerrar vista previa';
            backBtn.onclick = (e) => { e.preventDefault(); window.close(); };
            return;
        }
        backBtn.innerHTML = '<span>←</span><span class="btn-back-text">&nbsp;Volver</span>';
        backBtn.title = 'Volver';
        backBtn.onclick = (e) => {
            e.preventDefault();
            const slugDirArc = getQueryParam('slugDirArc');
            if (slugDirArc) window.location.href = `index.html?slugDirArc=${encodeURIComponent(slugDirArc)}`;
            else if (window.history.length > 1) window.history.back();
            else window.location.href = 'index.html';
        };
    })();
</script>
