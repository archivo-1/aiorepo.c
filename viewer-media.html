<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ArchVista - Visor Multimedia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #050608; --panel: #0d1117; --header-h: 52px; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: #e5e7eb;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            height: var(--header-h);
            min-height: var(--header-h);
            padding: 0 1rem;
            background: var(--panel);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 2000;
            position: relative;
            touch-action: none;
        }
        .nav-group { display: flex; align-items: center; gap: 0.8rem; }
        .btn-action {
            color: #9ca3af;
            text-decoration: none;
            font-size: 11px;
            background: rgba(255,255,255,0.03);
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
            white-space: nowrap;
            text-transform: uppercase;
            font-weight: 600;
        }
        .btn-action:hover { color: var(--accent); border-color: var(--accent); }
        h1 { font-size: 14px; font-weight: 500; color: #fff; max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #main-viewer { 
            flex: 1;
            width: 100%;
            position: relative;
            overflow: auto;
            background: var(--bg);
            -webkit-overflow-scrolling: touch;
            touch-action: auto;
        }
        #content-wrapper { 
            width: 100%;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #pdf-render-container { 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transform-origin: top center;
        }
        .pdf-page { box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: block; }
        .iframe-container {
            width: 100%;
            height: calc(100vh - var(--header-h));
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
            z-index: 1; 
        }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        .video-container { width: 100%; max-width: 1000px; padding: 1rem; }
        video { width: 100%; background: #000; border-radius: 8px; }
        .metadata-card {
            margin: 1.5rem 0; background: var(--panel);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px; padding: 1.2rem;
        }
        .collection-nav-container { 
            position: fixed; top: 50%; right: 0; 
            transform: translateY(-50%) translateZ(10px);
            z-index: 9999;
            display: flex; align-items: center;
            touch-action: none;
            pointer-events: auto;
        }
        .coll-side-tab {
            background: rgba(0, 0, 0, 0.95); color: var(--accent);
            border: 1px solid rgba(0, 242, 255, 0.4); border-right: none;
            padding: 20px 8px; border-radius: 10px 0 0 10px;
            cursor: pointer; writing-mode: vertical-rl;
            text-transform: uppercase; font-size: 0.6rem; font-weight: 800;
        }
        .coll-panel {
            background: var(--panel); width: 0; height: 0;
            overflow: hidden; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        .collection-nav-container.open .coll-panel {
            width: 280px; height: 70vh;
            border: 1px solid rgba(0, 242, 255, 0.3); border-right: none;
            border-radius: 10px 0 0 10px;
        }
        .coll-item {
            display: block; padding: 1rem; color: #9ca3af;
            text-decoration: none; font-size: 0.75rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .coll-item.active { color: var(--accent); background: rgba(0, 242, 255, 0.05); border-right: 3px solid var(--accent); }
        #zoom-controls { position: fixed; bottom: 30px; left: 20px; display: none; flex-direction: column; gap: 12px; z-index: 1500; }
        .zoom-btn { width: 48px; height: 48px; border-radius: 50%; background: rgba(13, 17, 23, 0.9); border: 1px solid var(--accent); color: var(--accent); font-size: 20px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        @media (max-width: 600px) {
            h1 { max-width: 130px; }
            .collection-nav-container.open .coll-panel { width: 240px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-group">
            <a href="#" id="back-btn" class="btn-action">← Volver</a>
            <h1 id="item-title">Cargando...</h1>
        </div>
        <div id="toolbar-actions" class="nav-group"></div>
    </header>

    <div id="main-viewer">
        <div id="content-wrapper"></div>
    </div>

    <div class="collection-nav-container" id="collection-nav" style="display: none;">
        <div class="coll-side-tab" id="collTab">Colección</div>
        <div class="coll-panel" id="collPanel">
            <div style="padding:1rem; border-bottom:1px solid rgba(255,255,255,0.1);">
                <h2 id="collNameLabel" style="font-size:0.65rem; color:var(--accent); text-transform:uppercase;">Navegar</h2>
            </div>
            <div id="collItemList" style="overflow-y:auto;"></div>
        </div>
    </div>

    <div id="zoom-controls">
        <button class="zoom-btn" id="zoomInBtn">+</button>
        <button class="zoom-btn" id="zoomOutBtn">−</button>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let currentPdf = null, pdfScale = 1.0, isRendering = false;
        const viewer = document.getElementById('main-viewer');
        const params = new URLSearchParams(window.location.search);
        const itemId = params.get('id');
        const slugDirArc = params.get('slugDirArc') || null;

        // Pinch zoom PDF
        let initialDist = 0;
        viewer.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && currentPdf) {
                const dist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                if (initialDist > 0) {
                    if (dist > initialDist + 40) { changeZoom(0.1); initialDist = dist; }
                    else if (dist < initialDist - 40) { changeZoom(-0.1); initialDist = dist; }
                } else {
                    initialDist = dist;
                }
            }
        }, { passive: true });
        viewer.addEventListener('touchend', () => { initialDist = 0; });

        async function loadItems() {
            let url;
            if (slugDirArc) {
                url = `https://zihojlqhxfxdjahgrbwy.functions.supabase.co/dirarc-json?slug=${encodeURIComponent(slugDirArc)}`;
            } else {
                url = 'content.json';
            }
            const res = await fetch(url);
            const data = await res.json();
            return Array.isArray(data) ? data : (data.items || []);
        }

        async function loadContent() {
            const wrapper = document.getElementById('content-wrapper');
            const toolbar = document.getElementById('toolbar-actions');

            try {
                const items = await loadItems();
                const item = items.find(i => i.id === itemId);
                if (!item) throw new Error('Archivo no encontrado');

                document.getElementById('item-title').textContent = item.nombre || item.id;
                setupCollectionSideNav(items, item);

                const ext = (item.archivo || '').split('.').pop().toLowerCase();

                if (!['enlace', 'enlaceEXT', 'yt/vm'].includes(item.categoria)) {
                    toolbar.innerHTML = `<a href="${item.archivo}" download class="btn-action">Descargar</a>`;
                }

                if (item.categoria === 'pdf' || ext === 'pdf') {
                    document.getElementById('zoom-controls').style.display = 'flex';
                    wrapper.innerHTML = '<div id="pdf-render-container"></div>';
                    initPDF(item.resolved_url || item.archivo);
                } else if (item.categoria === 'video') {
                    wrapper.innerHTML = `
                        <div class="video-container">
                            <video controls playsinline autoplay src="${item.resolved_url || item.archivo}"></video>
                            <div class="metadata-card">
                                <h2>Descripción</h2>
                                <p>${item.descripcion || 'Sin descripción.'}</p>
                            </div>
                        </div>`;
                } else if (['jpg','png','webp','jpeg'].includes(ext)) {
                    wrapper.innerHTML = `<img src="${item.resolved_url || item.archivo}" style="max-width:100%; margin:20px; box-shadow:0 10px 30px rgba(0,0,0,0.5);">`;
                } else if (item.categoria === 'enlace') {
                    toolbar.innerHTML = `<button class="btn-action" onclick="window.open('${item.archivo}', '_blank')">Pestaña ↗</button>`;
                    wrapper.innerHTML = `<div class="iframe-container"><iframe src="${item.resolved_url || item.archivo}" allowfullscreen></iframe></div>`;
                } 
                // AUDIO
                else if (item.categoria === 'audio' || ['mp3','wav','ogg'].includes(ext)) {
                    wrapper.innerHTML = `
                        <div class="video-container" style="display:flex; flex-direction:column; justify-content:center; align-items:center; min-height: 400px;">
                            <audio controls autoplay src="${item.resolved_url || item.archivo}" style="width:100%; outline:none;"></audio>
                            <div class="metadata-card" style="width:100%; text-align:left;">
                                <h2>Descripción</h2>
                                <p>${item.descripcion || 'Reproduciendo archivo de audio.'}</p>
                            </div>
                        </div>`;
                }
                // TXT y MD
else if (item.categoria === 'txt' || ext === 'txt' || item.categoria === 'md' || ext === 'md') {
    const txtResponse = await fetch(item.resolved_url || item.archivo);
    const content = await txtResponse.text();

    // Para md mostramos el mismo bloque, pero con clase extra para poder
    // aplicar estilos de "código" más adelante si quieres.
    const isMd = item.categoria === 'md' || ext === 'md';

    wrapper.innerHTML = `
        <div style="width: 100%; padding: 2rem; display: flex; justify-content: center;">
            <pre class="${isMd ? 'code-md-block' : ''}"
                 style="background: var(--panel); padding: 1.5rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); color: #e5e7eb; white-space: pre-wrap; word-wrap: break-word; font-family: monospace; max-width: 800px; width: 100%; font-size: 13px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); overflow-x:auto;">
${content.replace(/</g, "&lt;").replace(/>/g, "&gt;")}
            </pre>
        </div>`;
}
                // YT / Vimeo
                else if (item.categoria === 'yt/vm') {
                    let embedUrl = item.archivo;

                    if (embedUrl.includes('youtube.com/watch?v=')) {
                        embedUrl = embedUrl.replace('youtube.com/watch?v=', 'youtube.com/embed/').split('&')[0];
                    } else if (embedUrl.includes('youtu.be/')) {
                        embedUrl = embedUrl.replace('youtu.be/', 'youtube.com/embed/').split('?')[0];
                    } else if (embedUrl.includes('vimeo.com/') && !embedUrl.includes('player.vimeo.com/video/')) {
                        const vimeoId = embedUrl.split('vimeo.com/')[1].split('/')[0];
                        embedUrl = `https://player.vimeo.com/video/${vimeoId}`;
                    }

                    toolbar.innerHTML = `<button class="btn-action" onclick="window.open('${item.archivo}', '_blank')">Pestaña ↗</button>`;
                    wrapper.innerHTML = `<div class="iframe-container"><iframe src="${embedUrl}" allowfullscreen></iframe></div>`;
                }
                // enlaceEXT
                else if (item.categoria === 'enlaceEXT') {
                    toolbar.innerHTML = `<button class="btn-action" onclick="window.open('${item.archivo}', '_blank')">Pestaña ↗</button>`;
                    wrapper.innerHTML = `
                        <div style="display:flex; align-items:center; justify-content:center; height: calc(100vh - var(--header-h)); width:100%; padding: 2rem;">
                            <div class="metadata-card" style="text-align:center; max-width: 450px; width: 100%; display:flex; flex-direction:column; align-items:center; gap:15px;">
                                <h2 style="color:#fff; font-size:1.3rem;">Contenido Externo</h2>
                                <p style="color:#9ca3af; font-size:0.95rem; line-height:1.5;">
                                    ${item.descripcion || 'Este contenido está alojado en un sitio externo que requiere ser abierto en una nueva pestaña para su correcta visualización.'}
                                </p>
                                <a href="${item.archivo}" target="_blank" style="margin-top:10px; display:inline-block; background:var(--accent); color:#000; padding:12px 24px; border-radius:6px; text-decoration:none; font-weight:700; font-size:14px; text-transform:uppercase;">
                                    Abrir en nueva pestaña ↗
                                </a>
                            </div>
                        </div>`;
                } else {
                    wrapper.innerHTML = `<p style="padding:2rem;">Formato no reconocido.</p>`;
                }

            } catch (err) {
                wrapper.innerHTML = `<p style="padding:2rem;">Error: ${err.message}</p>`;
            }
        }

        async function initPDF(url) {
            const loadingTask = pdfjsLib.getDocument(url);
            currentPdf = await loadingTask.promise;
            const firstPage = await currentPdf.getPage(1);
            const viewport = firstPage.getViewport({ scale: 1 });
            pdfScale = (viewer.clientWidth - 40) / viewport.width;
            if (pdfScale > 1.2) pdfScale = 1.2;
            renderAllPages();
        }

        async function renderAllPages() {
            if (isRendering || !currentPdf) return;
            isRendering = true;
            const container = document.getElementById('pdf-render-container');
            container.innerHTML = ''; 
            for (let pageNum = 1; pageNum <= currentPdf.numPages; pageNum++) {
                const page = await currentPdf.getPage(pageNum);
                const viewport = page.getViewport({ scale: pdfScale });
                const canvas = document.createElement('canvas');
                canvas.className = 'pdf-page';
                const context = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                canvas.width = Math.floor(viewport.width * dpr);
                canvas.height = Math.floor(viewport.height * dpr);
                canvas.style.width = Math.floor(viewport.width) + "px";
                canvas.style.height = Math.floor(viewport.height) + "px";
                context.scale(dpr, dpr);
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                container.appendChild(canvas);
            }
            isRendering = false;
        }

        function changeZoom(delta) {
            const newScale = pdfScale + delta;
            if (newScale >= 0.3 && newScale <= 3.0) {
                pdfScale = newScale;
                renderAllPages();
            }
        }

        document.getElementById('zoomInBtn').onclick = () => changeZoom(0.2);
        document.getElementById('zoomOutBtn').onclick = () => changeZoom(-0.2);

        function setupCollectionSideNav(allData, currentItem) {
            const collName = currentItem.coleccion || currentItem.collection;
            if (!collName) return;

            const siblings = allData.filter(i => i.coleccion === collName || i.collection === collName);
            if (siblings.length <= 1) return;

            const container = document.getElementById('collection-nav');
            container.style.display = 'flex';
            
            const label = document.getElementById('collNameLabel');
            if (label) label.textContent = collName;

            const itemList = document.getElementById('collItemList');
            const extra = slugDirArc ? `&slugDirArc=${encodeURIComponent(slugDirArc)}` : '';

            itemList.innerHTML = siblings.map(i => {
                const visorType = i.visor || 'media';
                const url = `viewer-${visorType}.html?id=${encodeURIComponent(i.id)}${extra}`;
                return `
                    <a href="${url}" class="coll-item ${i.id === currentItem.id ? 'active' : ''}">
                        ${i.nombre || i.id}
                    </a>`;
            }).join('');

            document.getElementById('collTab').onclick = (e) => {
                e.stopPropagation();
                const isOpen = container.classList.toggle('open');
                const iframe = document.querySelector('.iframe-container iframe');
                if (iframe) iframe.style.pointerEvents = isOpen ? 'none' : 'auto';
            };
            
            document.addEventListener('pointerdown', e => {
                if (!container.contains(e.target)) {
                    container.classList.remove('open');
                    const iframe = document.querySelector('.iframe-container iframe');
                    if (iframe) iframe.style.pointerEvents = 'auto';
                }
            });
        }

        loadContent();
                // Lógica unificada del botón Volver
        (function setupBackButton() {
            const backBtn = document.getElementById('back-btn');
            if (!backBtn) return;

            backBtn.addEventListener('click', (e) => {
                e.preventDefault();
                const params = new URLSearchParams(window.location.search);
                const slugDirArc = params.get('slugDirArc');

                if (slugDirArc) {
                    const target = `index.html?slugDirArc=${encodeURIComponent(slugDirArc)}`;
                    window.location.href = target;
                } else {
                    if (window.history.length > 1) {
                        window.history.back();
                    } else {
                        window.location.href = 'index.html';
                    }
                }
            });
        })();

    </script>
</body>
</html>
