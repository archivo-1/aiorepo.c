<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aio Repo C 1.0</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050608">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AIO Repo">

    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="thumbnails/icon-192.png">

    <style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #050608;
  --surface: #0d1117;
  --surface2: #111520;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e5e7eb;
  --muted: #6b7280;
  --accent: #3b82f6;
  --accent-dim: rgba(59,130,246,0.15);

  --title-strong: var(--text);
  --collection-title: var(--accent);
  --thumb-bg: var(--surface2);
  --button-text: var(--accent);
  --footer-text: var(--muted);

  --accent-border: rgba(59,130,246,0.28);
  --focus-ring: rgba(59,130,246,0.45);
  --hover-accent-border: rgba(59,130,246,0.4);

  --panel-bg: var(--surface);
  --panel-bg-soft: var(--surface2);
  --panel-elevated: rgba(255,255,255,0.02);
  --glass-blur: none;
  --header-blur: blur(14px);
}

html, body {
  width: 100%;
  min-height: 100%;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

header {
  width: 100%;
  margin: 0;
  padding: 0;
  border-bottom: 1px solid var(--border);
  display: block;
  background: transparent;
}

.header-inner {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1.5rem;
  flex-wrap: wrap;
  padding: 1.2rem 2rem;
  background: var(--panel-bg);
  backdrop-filter: var(--header-blur);
  -webkit-backdrop-filter: var(--header-blur);
}

.logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  text-decoration: none;
  flex: 0 1 auto;
  min-width: 0;
  padding: 0;
}

.logo-copy {
  display: flex;
  flex-direction: column;
  gap: 0.1rem;
  min-width: 0;
}

.logo h1 {
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
  white-space: nowrap;
}

.logo span {
  font-size: 0.75rem;
  color: var(--muted);
  letter-spacing: 0.01em;
  white-space: nowrap;
}

.logo-mark {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  overflow: hidden;
  flex-shrink: 0;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-mark img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.logo-mark[hidden] {
  display: none !important;
}

.controls-wrap {
  display: flex;
  align-items: center;
  gap: 1rem;
  flex: 1 1 640px;
  min-width: 320px;
  max-width: none;
  justify-content: flex-end;
  padding: 0;
}

.search-wrap {
  flex: 1 1 420px;
  min-width: 220px;
  position: relative;
}

.search-wrap input {
  width: 100%;
  padding: 0.45rem 0.85rem 0.45rem 2.2rem;
  background: var(--panel-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.82rem;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
}

.search-wrap input:focus {
  border-color: var(--focus-ring);
}

.search-wrap svg {
  position: absolute;
  left: 0.65rem;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  stroke: var(--muted);
  fill: none;
  pointer-events: none;
}

.sort-select {
  flex: 0 0 220px;
  min-width: 180px;
  background: var(--panel-bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.45rem;
  font-size: 0.82rem;
  outline: none;
  cursor: pointer;
}

.filters-container {
  width: 100%;
  position: relative;
  margin: 0.35rem 0 0;
  border-bottom: 1px solid var(--border);
  background: var(--panel-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
}

.filters-container::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 40px;
  background: linear-gradient(to right, var(--panel-bg), transparent);
  z-index: 2;
  pointer-events: none;
}

.filters-container::after {
  content: "";
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 40px;
  background: linear-gradient(to left, var(--panel-bg), transparent);
  z-index: 2;
  pointer-events: none;
}

.filters {
  width: 100%;
  padding: 0.42rem 2rem 0;
  display: flex;
  gap: 0.35rem;
  flex-wrap: nowrap;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.filters::-webkit-scrollbar {
  display: none;
}

.filter-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.28rem 0.72rem;
  margin-bottom: 0.42rem;
  font-size: 0.76rem;
  font-weight: 500;
  background: transparent;
  color: var(--muted);
  border: 1px solid transparent;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.12s;
  flex-shrink: 0;
}

.filter-btn:hover {
  color: var(--text);
  border-color: var(--border2);
}

.filter-btn.active {
  background: var(--accent-dim);
  color: var(--button-text);
  border-color: var(--accent-border);
}

.tab-count {
  font-size: 0.62rem;
  font-weight: 600;
  background: rgba(255,255,255,0.07);
  color: var(--muted);
  padding: 0.08rem 0.38rem;
  border-radius: 20px;
}

main {
  flex: 1;
  width: 100%;
  padding: 1.75rem 2rem;
  margin: 0;
}

#main-container {
  width: 100%;
}

#grid {
  width: 100%;
  display: block;
}

.grid-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.2rem;
  width: 100%;
}

.grid-label {
  font-size: 0.72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.collection-section {
  width: 100%;
  margin-bottom: 1rem;
  border-radius: 12px;
  background: var(--panel-elevated);
  overflow: hidden;
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
}

.collection-header {
  width: 100%;
  padding: 1rem;
  background: var(--panel-bg);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 1rem;
  cursor: pointer;
  transition: background 0.2s;
  user-select: none;
}

.collection-header:hover {
  background: var(--panel-bg-soft);
}

.collection-header h2 {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--collection-title);
  flex: 1;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  pointer-events: none;
  min-width: 0;
}

.collection-arrow {
  font-size: 0.6rem;
  transition: transform 0.3s;
  color: var(--muted);
  transform: rotate(0deg);
  pointer-events: none;
  flex-shrink: 0;
}

.collection-content {
  width: 100%;
  padding: 1.15rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 1.15rem;
  align-items: start;
}

.collection-section.collapsed .collection-content {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  padding: 0.5rem 1rem 1rem;
}

.collection-section.collapsed .collection-arrow {
  transform: rotate(-90deg);
}

.card {
  min-width: 0;
  width: 100%;
  background: var(--panel-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  cursor: pointer;
  transition: all 0.15s;
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
}

.card:hover {
  border-color: var(--hover-accent-border);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.card-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  background: var(--thumb-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.card-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.card-body {
  min-width: 0;
  padding: 0.9rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.45rem;
  flex: 1;
}

.card-title {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--title-strong);
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
}

.badge {
  font-size: 0.6rem;
  font-weight: 600;
  padding: 0.16rem 0.5rem;
  border-radius: 20px;
  text-transform: uppercase;
  background: var(--panel-bg-soft);
  color: var(--muted);
  border: 1px solid var(--border);
  flex-shrink: 0;
  white-space: nowrap;
}

.card-desc {
  font-size: 0.77rem;
  color: var(--muted);
  line-height: 1.55;
  overflow: hidden;
  display: -webkit-box;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;
  line-clamp: 2;
}

.card-footer {
  padding: 0.65rem 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
}

.btn-view {
  font-size: 0.73rem;
  font-weight: 500;
  padding: 0.3rem 0.8rem;
  background: var(--accent-dim);
  color: var(--button-text);
  border: 1px solid var(--accent-border);
  border-radius: 6px;
  cursor: pointer;
  flex-shrink: 0;
}

.collapsed .card {
  flex-direction: row;
  align-items: center;
  height: 64px;
  border-color: transparent;
  background: transparent;
  gap: 0.5rem;
  position: relative;
  z-index: 10;
}

.collapsed .card:hover {
  background: rgba(255,255,255,0.03);
  transform: none;
  box-shadow: none;
}

.collapsed .card-thumb {
  width: 56px !important;
  height: 42px !important;
  flex-shrink: 0;
  margin-left: 0.5rem;
  border-radius: 6px;
}

.collapsed .card-body {
  padding: 0 0.5rem;
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
  flex: 1;
  gap: 0.5rem;
}

.collapsed .card-desc,
.collapsed .card-footer {
  display: none;
}

.collapsed .card-title {
  font-size: 0.78rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 180px;
}

footer {
  width: 100%;
  padding: 2rem;
  border-top: 1px solid var(--border);
  font-size: 0.7rem;
  color: var(--footer-text);
  text-align: center;
}

@media (max-width: 768px) {
  .header-inner {
    padding: 0.9rem 0.75rem;
    gap: 0.75rem;
    align-items: stretch;
  }

  .logo {
    width: 100%;
    padding: 0;
  }

  .controls-wrap {
    width: 100%;
    min-width: 0;
    flex: 1 1 100%;
    justify-content: stretch;
    flex-wrap: wrap;
    gap: 0.75rem;
    padding: 0;
  }

  .search-wrap {
    flex: 1 1 100%;
    min-width: 0;
  }

  .sort-select {
    flex: 1 1 100%;
    min-width: 0;
  }

  .filters-container {
    margin-top: 0.3rem;
  }

  .filters {
    padding: 0.38rem 0.75rem 0;
  }

  .filter-btn {
    padding: 0.26rem 0.68rem;
    margin-bottom: 0.38rem;
    font-size: 0.74rem;
  }

  main {
    padding: 0.75rem 0.75rem 1rem;
  }

  .collection-content {
    padding: 0.75rem;
    gap: 0.75rem;
  }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div id="dirarc-logo" class="logo-mark" hidden></div>
      <div class="logo-copy">
        <h1 id="dirarc-title">Aio Repo</h1>
        <span id="dirarc-subtitle">Aio Repo C 1.0</span>
      </div>
    </div>

    <div class="controls-wrap">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input
          type="text"
          id="search"

        >
      </div>

      <select id="sort-order" class="sort-select">
        <option value="coleccion">Agrupar por colecciones</option>
        <option value="az">Alfabético (A-Z)</option>
        <option value="za">Alfabético (Z-A)</option>
        <option value="tipo">Agrupar por tipo</option>
      </select>
    </div>
  </div>
</header>

<div class="filters-container">
    <div class="filters" id="filters">
        <button class="filter-btn active" data-cat="all">Todo <span class="tab-count" id="count-all">0</span></button>
    </div>
</div>

<main id="main-container">
    <div class="grid-header">
        <span class="grid-label" id="grid-label">Cargando ...</span>
    </div>
    <div id="grid"></div>
</main>

<footer>Archivo-1 — <a href="https://github.com/archivo-1/aiorepo">github.com/archivo-1/aiorepo</a></footer>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker Registered"));
    }
    
    let MODELS = [];
    const CATEGORIAS = [
  'modelo-3d', 'modelo-2d', 'modelo-BIM',
  'pdf', 'video', 'audio', 'mapa',
  'doc', 'txt', 'md',
  'gdoc', 'gsheet', 'gslide',
  'galeria', 'enlace', 'enlaceEXT', 'yt/vm'
];
    let activeFilter = 'all';
    let searchQuery = '';
    let currentSort = 'coleccion';

    const nombresCategoria = {
  'modelo-3d': 'Modelo 3D',
  'modelo-2d': 'Modelo 2D',
  'modelo-BIM': 'Modelo BIM',
  'pdf': 'PDF',
  'video': 'Video',
  'audio': 'Audio',
  'mapa': 'Mapa',
  'doc': 'Documento',
  'txt': 'Texto',
  'md': 'Código / Markdown',
  'gdoc': 'Google Doc',
  'gsheet': 'Google Sheet',
  'gslide': 'Google Slides',
  'galeria': 'Galería',
  'enlace': 'Enlace',
  'enlaceEXT': 'Enlace ext.',
  'yt/vm': 'YouTube / Vimeo'
};

const DEFAULT_THEME = {
  version: 1,
  preset: 'obsidian',
  colors: {
    bg: '#050608',
    surface: '#0d1117',
    surface2: '#111520',
    border: 'rgba(255,255,255,0.07)',
    border2: 'rgba(255,255,255,0.12)',
    text: '#e5e7eb',
    muted: '#6b7280',
    accent: '#3b82f6',
    accentDim: 'rgba(59,130,246,0.15)',
    titleText: '#e5e7eb',
    collectionTitle: '#3b82f6'
  },
  background: {
    mode: 'solid',
    color: '#050608',
    imageUrl: '',
    imageFit: 'cover',
    overlay: 0
  },
  branding: {
    useCustomTitle: false,
    customTitle: '',
    showSubtitle: true,
    customSubtitle: 'Aio Repo C',
    logoUrl: ''
  },
  thumbnails: {
    genericSet: 'gt_0',
    preferCustomItemThumbnail: true
  }
};

let CURRENT_THEME = mergeTheme(DEFAULT_THEME);

function mergeTheme(input) {
  const source = input && typeof input === 'object' ? input : {};
  return {
    version: source.version ?? 1,
    preset: source.preset ?? DEFAULT_THEME.preset,
    colors: {
      ...DEFAULT_THEME.colors,
      ...(source.colors || {})
    },
    background: {
      ...DEFAULT_THEME.background,
      ...(source.background || {})
    },
    branding: {
      ...DEFAULT_THEME.branding,
      ...(source.branding || {})
    },
    thumbnails: {
      ...DEFAULT_THEME.thumbnails,
      ...(source.thumbnails || {})
    }
  };
}

function escapeHtml(str = '') {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function normalizeGenericSetName(setName) {
  const raw = String(setName || '').trim();
  if (!raw) return 'default';
  if (raw === 'gt_0') return 'default';
  if (raw.startsWith('gt_')) return raw.slice(3);
  return raw;
}

function isGenericThumbnailPath(path = '') {
  return /^thumbnails\/gt_[^/]+\.png$/i.test(String(path).trim());
}

function buildGenericThumbnailPath(originalPath = '', theme = CURRENT_THEME) {
  const clean = String(originalPath || '').trim();
  if (!clean) return '';
  const fileName = clean.split('/').pop();
  const setName = normalizeGenericSetName(theme?.thumbnails?.genericSet);
  return `thumbnails/${setName}/${fileName}`;
}

function resolveThumbnail(item) {
  const raw = String(item?.thumbnail || '').trim();

  if (raw) {
    if (isGenericThumbnailPath(raw)) {
      return buildGenericThumbnailPath(raw, CURRENT_THEME);
    }
    return raw;
  }

  const categoria = String(item?.categoria || '').trim().toLowerCase();
  const visor = String(item?.visor || '').trim().toLowerCase();

  const fallbackByCategoria = {
    'pdf': 'thumbnails/gt_pdf.png',
    'video': 'thumbnails/gt_video.png',
    'audio': 'thumbnails/gt_audio.png',
    'mapa': 'thumbnails/gt_mapa.png',
    'doc': 'thumbnails/gt_doc.png',
    'txt': 'thumbnails/gt_txt.png',
    'md': 'thumbnails/gt_md.png',
    'gdoc': 'thumbnails/gt_gdoc.png',
    'gsheet': 'thumbnails/gt_gsheet.png',
    'gslide': 'thumbnails/gt_gslide.png',
    'galeria': 'thumbnails/gt_galeria.png',
    'enlace': 'thumbnails/gt_web.png',
    'enlaceext': 'thumbnails/gt_webext.png',
    'yt/vm': 'thumbnails/gt_videoext.png',
    'modelo-3d': 'thumbnails/gt_3dm.png',
    'modelo-bim': 'thumbnails/gt_ifc.png',
    'modelo-2d': 'thumbnails/gt_dxf.png'
  };

  const fallbackByVisor = {
    '3dm': 'thumbnails/gt_3dm.png',
    'ifc': 'thumbnails/gt_ifc.png',
    'dxf': 'thumbnails/gt_dxf.png',
    'glb': 'thumbnails/gt_glb.png',
    'media': 'thumbnails/gt_0.png',
    'map': 'thumbnails/gt_mapa.png'
  };

  const genericBase = fallbackByCategoria[categoria] || fallbackByVisor[visor] || 'thumbnails/gt_0.png';
  return buildGenericThumbnailPath(genericBase, CURRENT_THEME);
}

function hexToRgb(hex) {
  const clean = String(hex || '').replace('#', '').trim();
  if (!/^[0-9a-fA-F]{6}$/.test(clean)) return null;

  const num = parseInt(clean, 16);
  return {
    r: (num >> 16) & 255,
    g: (num >> 8) & 255,
    b: num & 255
  };
}

function rgbaFromHex(hex, alpha) {
  const rgb = hexToRgb(hex);
  if (!rgb) return `rgba(59,130,246,${alpha})`;
  return `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`;
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function withAlpha(hex, alpha) {
  const rgb = hexToRgb(hex);
  if (!rgb) return `rgba(15,23,42,${alpha})`;
  return `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`;
}

function applyThemeToUI(info = {}) {
  const titleEl = document.getElementById('dirarc-title');
  const subtitleEl = document.getElementById('dirarc-subtitle');
  const logoEl = document.getElementById('dirarc-logo');
  const metaTheme = document.querySelector('meta[name="theme-color"]');

  CURRENT_THEME = mergeTheme(info.theme_config || {});
  const theme = CURRENT_THEME;
  const root = document.documentElement;

  root.style.setProperty('--bg', theme.colors.bg || '#050608');
  root.style.setProperty('--surface', theme.colors.surface || '#0d1117');
  root.style.setProperty('--surface2', theme.colors.surface2 || '#111520');
  root.style.setProperty('--text', theme.colors.text || '#e5e7eb');
  root.style.setProperty('--muted', theme.colors.muted || '#6b7280');
  root.style.setProperty('--accent', theme.colors.accent || '#3b82f6');

  root.style.setProperty('--title-strong', theme.colors.titleText || theme.colors.text || '#e5e7eb');
  root.style.setProperty('--collection-title', theme.colors.collectionTitle || theme.colors.accent || '#3b82f6');
  root.style.setProperty('--thumb-bg', theme.colors.surface2 || '#111520');
  root.style.setProperty('--button-text', theme.colors.accent || '#3b82f6');
  root.style.setProperty('--footer-text', theme.colors.muted || '#6b7280');

  const hasImageBg = theme.background?.mode === 'image' && !!theme.background?.imageUrl;
  const baseSurface = theme.colors.surface || '#0d1117';
  const baseSurface2 = theme.colors.surface2 || '#111520';
  const baseBg = theme.colors.bg || '#050608';

  if (hasImageBg) {
    root.style.setProperty('--panel-bg', withAlpha(baseSurface, 0.82));
    root.style.setProperty('--panel-bg-soft', withAlpha(baseSurface2 || baseSurface, 0.74));
    root.style.setProperty('--panel-elevated', withAlpha(baseBg, 0.58));
    root.style.setProperty('--glass-blur', 'blur(10px)');

    root.style.setProperty('--border', withAlpha(theme.colors.text || '#e5e7eb', 0.12));
    root.style.setProperty('--border2', withAlpha(theme.colors.text || '#e5e7eb', 0.2));
    root.style.setProperty('--accent-dim', withAlpha(theme.colors.accent || '#3b82f6', 0.18));
  } else {
    root.style.setProperty('--panel-bg', theme.colors.surface || '#0d1117');
    root.style.setProperty('--panel-bg-soft', theme.colors.surface2 || theme.colors.surface || '#111520');
    root.style.setProperty('--panel-elevated', 'rgba(255,255,255,0.02)');
    root.style.setProperty('--glass-blur', 'none');

    root.style.setProperty('--border', theme.colors.border || 'rgba(255,255,255,0.07)');
    root.style.setProperty('--border2', theme.colors.border2 || 'rgba(255,255,255,0.12)');
    root.style.setProperty('--accent-dim', theme.colors.accentDim || rgbaFromHex(theme.colors.accent || '#3b82f6', 0.15));
  }

  root.style.setProperty('--accent-border', withAlpha(theme.colors.accent || '#3b82f6', 0.28));
  root.style.setProperty('--focus-ring', withAlpha(theme.colors.accent || '#3b82f6', 0.45));
  root.style.setProperty('--hover-accent-border', withAlpha(theme.colors.accent || '#3b82f6', 0.4));

  const fallbackTitle = info.title || info.slug || getQueryParam('slugDirArc') || 'Aio Repo';
  const finalTitle =
    theme.branding.useCustomTitle && theme.branding.customTitle?.trim()
      ? theme.branding.customTitle.trim()
      : fallbackTitle;

  const finalSubtitle = theme.branding.showSubtitle
    ? (theme.branding.customSubtitle?.trim() || 'Aio Repo C')
    : '';

  document.title = finalTitle;

  if (titleEl) titleEl.textContent = finalTitle;

  if (subtitleEl) {
    subtitleEl.textContent = finalSubtitle;
    subtitleEl.style.display = finalSubtitle ? 'block' : 'none';
  }

  if (logoEl) {
    const logoUrl = theme.branding.logoUrl?.trim();
    if (logoUrl) {
      logoEl.hidden = false;
      logoEl.innerHTML = `<img src="${escapeHtml(logoUrl)}" alt="Logo del dirArc">`;
    } else {
      logoEl.hidden = true;
      logoEl.innerHTML = '';
    }
  }

  if (metaTheme) {
    metaTheme.setAttribute('content', theme.background.color || theme.colors.bg || '#050608');
  }

  if (theme.background.mode === 'image' && theme.background.imageUrl) {
    const overlay = Math.max(0, Math.min(0.85, Number(theme.background.overlay ?? 0)));
    if (overlay > 0.01) {
      document.body.style.backgroundImage =
        `linear-gradient(rgba(0,0,0,${overlay}), rgba(0,0,0,${overlay})), url("${theme.background.imageUrl}")`;
    } else {
      document.body.style.backgroundImage = `url("${theme.background.imageUrl}")`;
    }
    document.body.style.backgroundSize = theme.background.imageFit || 'cover';
    document.body.style.backgroundPosition = 'center';
    document.body.style.backgroundRepeat = 'no-repeat';
    document.body.style.backgroundColor = theme.background.color || theme.colors.bg;
  } else {
    document.body.style.backgroundImage = 'none';
    document.body.style.backgroundColor = theme.background.color || theme.colors.bg;
    document.body.style.backgroundSize = 'cover';
    document.body.style.backgroundPosition = 'center';
    document.body.style.backgroundRepeat = 'no-repeat';
  }
}
    function getQueryParam(name) {
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}

async function loadContent() {
  const slugDirArc = getQueryParam('slugDirArc');
  let url;

  if (slugDirArc) {
    url = `https://zihojlqhxfxdjahgrbwy.functions.supabase.co/dirarc-json?slug=${encodeURIComponent(slugDirArc)}`;
  } else {
    url = 'content.json';
  }

  const res = await fetch(url);
  const data = await res.json();

  if (slugDirArc) {
    const items = data.items || [];
    applyThemeToUI(data);
    return items;
  } else {
    const normalized = Array.isArray(data) ? { items: data } : (data || {});
    const items = Array.isArray(normalized.items) ? normalized.items : [];
    applyThemeToUI({
      title: normalized.title || null,
      slug: normalized.slug || null,
      theme_config: normalized.theme_config || null
    });
    return items;
  }
}


    loadContent()
        .then(data => {
            MODELS = data;
            buildCategoryButtons();
            updateCounts();
            renderGrid();
        })
        .catch(err => {
            console.error('Error cargando contenido:', err);
            document.getElementById('grid').innerHTML =
              '<p style="color: var(--muted); text-align: center; padding: 2rem;">Error cargando contenido.</p>';
        });

    function buildCategoryButtons() {
        const categoriasPresentes = new Set(MODELS.map(m => m.categoria));
        const filtersDiv = document.getElementById('filters');
        CATEGORIAS.forEach(cat => {
            if (categoriasPresentes.has(cat)) {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.dataset.cat = cat;
                btn.innerHTML = `${nombresCategoria[cat] || cat} <span class="tab-count" id="count-${cat}">0</span>`;
                filtersDiv.appendChild(btn);
            }
        });
    }

    function updateCounts() {
        const allEl = document.getElementById('count-all');
        if (allEl) allEl.textContent = MODELS.length;
        CATEGORIAS.forEach(cat => {
            const el = document.getElementById('count-' + cat);
            if (el) el.textContent = MODELS.filter(m => m.categoria === cat).length;
        });
    }

    function toggleCollection(headerElement) {
        headerElement.closest('.collection-section').classList.toggle('collapsed');
    }

    function renderGrid() {
        const gridContainer = document.getElementById('grid');
        gridContainer.innerHTML = '';
        const isMobile = window.innerWidth <= 768;
        
        let visible = MODELS.filter(m => {
            const matchesCategory = (activeFilter === 'all' || m.categoria === activeFilter);
            const query = searchQuery.toLowerCase();
            const matchesSearch = !searchQuery || 
                                 (m.nombre || '').toLowerCase().includes(query) || 
                                 (m.descripcion || '').toLowerCase().includes(query) || 
                                 (m.coleccion || '').toLowerCase().includes(query);
            return matchesCategory && matchesSearch;
        });

        if (currentSort === 'az') visible.sort((a, b) => a.nombre.localeCompare(b.nombre));
        else if (currentSort === 'za') visible.sort((a, b) => b.nombre.localeCompare(a.nombre));
        else if (currentSort === 'tipo') visible.sort((a, b) => (a.categoria || '').localeCompare(b.categoria || ''));
        else if (currentSort === 'coleccion') {
            visible.sort((a, b) => (a.coleccion || 'Otros').localeCompare(b.coleccion || 'Otros') || a.nombre.localeCompare(b.nombre));
        }

        document.getElementById('grid-label').textContent = visible.length + ' item' + (visible.length !== 1 ? 's' : '');

        if (visible.length === 0) {
            gridContainer.innerHTML = '<p style="color: var(--muted); text-align: center; padding: 2rem;">No se encontraron elementos</p>';
            return;
        }

        if (currentSort === 'coleccion' || currentSort === 'tipo') {
            const groupField = currentSort === 'coleccion' ? 'coleccion' : 'categoria';
            const grupos = [...new Set(visible.map(m => m[groupField] || (groupField === 'coleccion' ? 'Otros' : 'General'))) ];
            grupos.forEach(groupName => {
                const section = document.createElement('div');
                section.className = 'collection-section';
                if (isMobile && !searchQuery) section.classList.add('collapsed');

                const displayName = currentSort === 'tipo' ? (nombresCategoria[groupName] || groupName) : groupName;
                const itemsInGroup = visible.filter(x => (x[groupField] || (groupField === 'coleccion' ? 'Otros' : 'General')) === groupName);

                section.innerHTML = `
                    <div class="collection-header" onclick="toggleCollection(this)">
                        <span class="collection-arrow">▼</span>
                        <h2>${displayName} <span style="font-size:0.6rem; opacity:0.5; font-weight:400;">(${itemsInGroup.length})</span></h2>
                    </div>
                    <div class="collection-content"></div>
                `;

                const contentDiv = section.querySelector('.collection-content');
                itemsInGroup.forEach(m => contentDiv.appendChild(createCard(m)));
                gridContainer.appendChild(section);
            });
        } else {
            const standardGrid = document.createElement('div');
            standardGrid.className = 'collection-content';
            visible.forEach(m => standardGrid.appendChild(createCard(m)));
            gridContainer.appendChild(standardGrid);
        }
    }

    function createCard(m) {
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = (e) => {
    e.preventDefault();
    e.stopPropagation();
    const slugDirArc = getQueryParam('slugDirArc');
    const extra = slugDirArc ? `&slugDirArc=${encodeURIComponent(slugDirArc)}` : '';
    window.location.href = `viewer-${m.visor}.html?id=${encodeURIComponent(m.id)}${extra}`;
  };

  const thumbSrc = resolveThumbnail(m);
  const thumb = thumbSrc
    ? `<img src="${escapeHtml(thumbSrc)}" alt="">`
    : `<div style="color: var(--muted)">📁</div>`;

  card.innerHTML = `
    <div class="card-thumb">${thumb}</div>
    <div class="card-body">
      <div style="display:flex; justify-content:space-between; align-items:center; gap: 0.5rem; width:100%;">
        <div class="card-title">${escapeHtml(m.nombre || 'Sin nombre')}</div>
        <span class="badge">${escapeHtml(nombresCategoria[m.categoria] || m.categoria || 'Item')}</span>
      </div>
      <div class="card-desc">${escapeHtml(m.descripcion || 'Sin descripción')}</div>
    </div>
    <div class="card-footer">
      <span style="font-size:0.65rem; color:var(--muted)">${escapeHtml(m.tamano || '')}</span>
      <button class="btn-view">Abrir</button>
    </div>
  `;
  return card;
}

    document.getElementById('filters').onclick = (e) => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.cat;
        renderGrid();
    };

    document.getElementById('search').addEventListener('input', (e) => {
        searchQuery = e.target.value.trim();
        renderGrid();
    });

    document.getElementById('sort-order').addEventListener('change', (e) => {
        currentSort = e.target.value;
        renderGrid();
    });

    window.addEventListener('resize', () => {
        const isMobile = window.innerWidth <= 768;
        if (window.lastIsMobile !== isMobile) {
            renderGrid();
            window.lastIsMobile = isMobile;
        }
    });
</script>
